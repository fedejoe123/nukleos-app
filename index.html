<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Núkleos" />
  <meta name="theme-color" content="#0d1f3c" />
  <title>Núkleos Quiropraxia</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    #root { height: 100%; }
    body { font-family: Georgia, serif; background: #0d1f3c; }
    body { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" src="App.jsx" data-presets="react"></script>

  <script>
    // Wait for Babel to finish transforming App.jsx, then mount
    document.addEventListener('DOMContentLoaded', function() {
      var checkApp = setInterval(function() {
        if (typeof App !== 'undefined') {
          clearInterval(checkApp);
          var container = document.getElementById('root');
          var root = ReactDOM.createRoot(container);
          root.render(React.createElement(App));
        }
      }, 100);
    });
  </script>
</body>
</html>
